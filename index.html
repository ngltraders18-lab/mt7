<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MT7 - Advanced Web Trading Terminal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'app-bg': '#030407',      
                        'panel-bg': '#0A0E17',    
                        'panel-hover': '#111827',
                        'border-color': '#1F2937',
                        'text-primary': '#F9FAFB',
                        'text-secondary': '#9CA3AF',
                        'accent-blue': '#2563EB', 
                        'accent-white': '#FFFFFF', 
                        'pnl-up': '#00E676',      
                        'pnl-down': '#FF1744',    
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Menlo', 'monospace'],
                    },
                    boxShadow: {
                        'glow-blue': '0 0 20px rgba(37, 99, 235, 0.3)',
                        'glow-white': '0 0 20px rgba(255, 255, 255, 0.15)',
                        'panel': '0 8px 32px rgba(0, 0, 0, 0.8)',
                    }
                }
            }
        }
    </script>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Load TradingView Lightweight Charts -->
    <script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
    <!-- Load Tone.js for Synthesized Trading Sounds -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        :root { color-scheme: dark; }

        body {
            background-color: #030407;
            color: #F9FAFB;
            overflow: hidden; 
            user-select: none;
            -webkit-font-smoothing: antialiased;
            touch-action: none; 
        }

        /* Modern scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #374151; }

        /* Glassmorphism */
        .glass {
            background: rgba(10, 14, 23, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(31, 41, 55, 0.8);
        }

        /* Desktop Grid Layout */
        .layout-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: 60px 1fr 280px;
            height: 100vh;
            width: 100vw;
            transition: grid-template-rows 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Class to collapse the terminal */
        .layout-grid.terminal-collapsed {
            grid-template-rows: 60px 1fr 40px; /* 40px is just the tab header height */
        }

        .l-header { grid-area: 1 / 1 / 2 / 3; }
        .l-market { grid-area: 2 / 1 / 4 / 2; }
        .l-chart { grid-area: 2 / 2 / 3 / 3; }
        .l-terminal { grid-area: 3 / 2 / 4 / 3; }

        /* Hide elements when terminal is collapsed */
        .terminal-collapsed .terminal-content {
            display: none !important;
        }
        .terminal-collapsed .l-chart {
            grid-area: 2 / 2 / 3 / 3; /* Expands automatically due to 1fr */
        }

        /* Mobile Layout Modifications */
        @media (max-width: 768px) {
            .layout-grid {
                display: flex;
                flex-direction: column;
                height: 100vh;
                width: 100vw;
            }
            .l-header { flex: none; height: 60px; }
            
            .mobile-view-container {
                flex: 1;
                position: relative;
                overflow: hidden;
            }
            
            .l-market, .l-chart, .l-terminal {
                position: absolute;
                top: 0; left: 0; right: 0; bottom: 0;
                display: none; 
                height: 100%;
                width: 100%;
            }

            .view-active {
                display: flex !important;
                flex-direction: column;
            }
            
            .l-terminal.view-active {
                padding-bottom: 64px; /* Space for mobile nav */
            }

            #quickTradeWidget {
                top: auto;
                bottom: 16px;
                left: 16px;
                right: 16px;
                width: auto;
            }
        }

        /* Animations */
        @keyframes flashBlue { 0% { background-color: rgba(37, 99, 235, 0.3); } 100% { background-color: transparent; } }
        @keyframes flashWhite { 0% { background-color: rgba(255, 255, 255, 0.2); } 100% { background-color: transparent; } }
        .tick-up { animation: flashBlue 0.5s ease-out; }
        .tick-down { animation: flashWhite 0.5s ease-out; }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            20% { transform: translate(-2px, 2px) rotate(-1deg); }
            40% { transform: translate(2px, -2px) rotate(1deg); }
            60% { transform: translate(-2px, -2px) rotate(0deg); }
            80% { transform: translate(2px, 2px) rotate(-1deg); }
        }
        .shake-screen { animation: screenShake 0.3s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes screenFlashBlue { 0% { box-shadow: inset 0 0 100px rgba(37, 99, 235, 0.4); background-color: rgba(37, 99, 235, 0.05); } 100% { box-shadow: inset 0 0 0px transparent; background-color: transparent; } }
        @keyframes screenFlashWhite { 0% { box-shadow: inset 0 0 100px rgba(255, 255, 255, 0.2); background-color: rgba(255, 255, 255, 0.03); } 100% { box-shadow: inset 0 0 0px transparent; background-color: transparent; } }
        .flash-buy { animation: screenFlashBlue 0.4s ease-out; }
        .flash-sell { animation: screenFlashWhite 0.4s ease-out; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none; margin: 0;
        }
        
        .tv-lightweight-charts {
            font-family: 'JetBrains Mono', monospace !important;
        }
    </style>
</head>

    <!-- Notification Toast Container -->
    <div id="toastContainer" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none w-72"></div>

    <script>
        // --- STREAMING_CHUNK: State Management and Audio Setup ---
        const state = {
            account: {
                balance: 50000.00,
                equity: 50000.00,
                margin: 0,
                leverage: 100
            },
            ui: {
                activeSymbol: 'EURUSD',
                volume: 1.00,
                searchQuery: '',
                categoryFilter: 'All',
                activeTab: 'positions',
                terminalCollapsed: false
            },
            assets: [
                { symbol: 'EURUSD', name: 'Euro / US Dollar', type: 'Forex', bid: 1.09452, ask: 1.09465, spread: 1.3, digits: 5 },
                { symbol: 'GBPUSD', name: 'Pound / US Dollar', type: 'Forex', bid: 1.28450, ask: 1.28468, spread: 1.8, digits: 5 },
                { symbol: 'USDJPY', name: 'US Dollar / Yen', type: 'Forex', bid: 156.321, ask: 156.335, spread: 1.4, digits: 3 },
                { symbol: 'XAUUSD', name: 'Gold / US Dollar', type: 'Forex', bid: 2345.50, ask: 2345.85, spread: 3.5, digits: 2 },
                { symbol: 'BTCUSD', name: 'Bitcoin / US Dollar', type: 'Crypto', bid: 64230.00, ask: 64245.00, spread: 15, digits: 2 },
                { symbol: 'ETHUSD', name: 'Ethereum / US Dollar', type: 'Crypto', bid: 3450.20, ask: 3452.00, spread: 1.8, digits: 2 },
                { symbol: 'SPX500', name: 'S&P 500 Index', type: 'Indices', bid: 5240.2, ask: 5241.5, spread: 1.3, digits: 1 },
                { symbol: 'NDX100', name: 'Nasdaq 100', type: 'Indices', bid: 18450.5, ask: 18452.0, spread: 1.5, digits: 1 },
            ],
            positions: [], // Active trades { ticket, ..., priceLineRef }
            history: []
        };

        let lwChart = null;
        let candleSeries = null;
        let chartDataBuffer = {}; // Store historical dummy data per symbol

        // Audio Engine
        let audioInit = false;
        const synthUI = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0.0, release: 0.1 } }).toDestination(); synthUI.volume.value = -20;
        const synthSuccess = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "sine" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 1 } }).toDestination(); synthSuccess.volume.value = -12;
        const synthLoss = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "sawtooth" }, envelope: { attack: 0.1, decay: 0.3, sustain: 0.1, release: 1 } }).toDestination(); synthLoss.volume.value = -15;

        async function initAudio() {
            if(!audioInit) { await Tone.start(); audioInit = true; }
        }
        document.body.addEventListener('click', initAudio, { once: true });
        document.body.addEventListener('touchstart', initAudio, { once: true });

        function triggerVibration(pattern) {
            if (typeof navigator.vibrate === 'function') navigator.vibrate(pattern);
        }
        const formatMoney = (amount) => amount.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
        
        function showToast(title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `glass border border-border-color rounded-lg p-3 flex flex-col transform translate-x-full transition-all duration-300 pointer-events-auto shadow-panel`;
            toast.innerHTML = `<div class="flex justify-between items-center mb-1"><span class="font-bold text-text-primary text-xs">${title}</span><i class="ph ph-x text-text-secondary cursor-pointer hover:text-white" onclick="this.parentElement.parentElement.remove()"></i></div><span class="text-text-secondary text-xs">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-x-full'), 10);
            setTimeout(() => { toast.classList.add('translate-x-full'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // --- STREAMING_CHUNK: TradingView Lightweight Charts Initialization ---
        function generateHistoricalData(asset) {
            if(chartDataBuffer[asset.symbol]) return chartDataBuffer[asset.symbol];
            
            let data = [];
            let time = Math.floor(Date.now() / 1000) - 200 * 15 * 60; // 200 candles ago, 15m
            let o = asset.bid;
            const volatility = asset.digits <= 3 ? (asset.symbol === 'BTCUSD' ? 50 : 0.2) : 0.002;

            for(let i=0; i<200; i++) {
                let c = o + (Math.random()-0.5)*volatility;
                let h = Math.max(o, c) + Math.random()*(volatility/2);
                let l = Math.min(o, c) - Math.random()*(volatility/2);
                // align to 15m boundaries roughly
                time -= time % (15*60);
                data.push({ time: time, open: o, high: h, low: l, close: c });
                o = c;
                time += 15 * 60;
            }
            
            // Sync last candle with actual current price
            const last = data[data.length-1];
            last.close = asset.bid;
            if(asset.bid > last.high) last.high = asset.bid;
            if(asset.bid < last.low) last.low = asset.bid;

            chartDataBuffer[asset.symbol] = data;
            return data;
        }

        function initTradingView() {
            const container = document.getElementById('tv_chart_container');
            container.innerHTML = ''; // clear
            
            lwChart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: container.clientHeight,
                layout: {
                    background: { type: 'solid', color: '#030407' },
                    textColor: '#9CA3AF',
                    fontFamily: "'JetBrains Mono', monospace",
                },
                grid: {
                    vertLines: { color: '#0A0E17' },
                    horzLines: { color: '#0A0E17' },
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal,
                    vertLine: { color: '#1F2937', labelBackgroundColor: '#2563EB' },
                    horzLine: { color: '#1F2937', labelBackgroundColor: '#2563EB' },
                },
                rightPriceScale: {
                    borderColor: '#1F2937',
                },
                timeScale: {
                    borderColor: '#1F2937',
                    timeVisible: true,
                },
            });

            candleSeries = lwChart.addCandlestickSeries({
                upColor: '#2563EB',       // Blue Bullish
                downColor: '#FFFFFF',      // White Bearish
                borderDownColor: '#FFFFFF',
                borderUpColor: '#2563EB',
                wickDownColor: '#FFFFFF',
                wickUpColor: '#2563EB',
            });

            const asset = state.assets.find(a => a.symbol === state.ui.activeSymbol);
            const data = generateHistoricalData(asset);
            candleSeries.setData(data);

            // Re-apply open position lines for this symbol
            state.positions.forEach(pos => {
                if(pos.symbol === state.ui.activeSymbol) {
                    drawOrderLineOnChart(pos);
                }
            });

            // Handle Resize
            new ResizeObserver(entries => {
                if (entries.length === 0 || entries[0].target !== container) return;
                const newRect = entries[0].contentRect;
                lwChart.applyOptions({ height: newRect.height, width: newRect.width });
            }).observe(container);
        }

        function drawOrderLineOnChart(pos) {
            if(!candleSeries || pos.symbol !== state.ui.activeSymbol) return;
            const color = pos.type === 'BUY' ? '#2563EB' : '#FFFFFF';
            pos.priceLineRef = candleSeries.createPriceLine({
                price: pos.openPrice,
                color: color,
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: true,
                title: `${pos.type} #${pos.ticket}`,
            });
        }

        // --- STREAMING_CHUNK: UI Interactions and Layout ---
        function toggleProfileModal() {
            const modal = document.getElementById('profileModal');
            const content = document.getElementById('profileContent');
            
            if(modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modal.classList.remove('opacity-0');
                    content.classList.remove('scale-95');
                }, 10);
            } else {
                modal.classList.add('opacity-0');
                content.classList.add('scale-95');
                setTimeout(() => {
                    modal.classList.add('hidden');
                    modal.classList.remove('flex');
                }, 300);
            }
        }

        function toggleTerminal() {
            state.ui.terminalCollapsed = !state.ui.terminalCollapsed;
            const layout = document.getElementById('main-layout');
            const icon = document.getElementById('terminalToggleIcon');
            
            if (state.ui.terminalCollapsed) {
                layout.classList.add('terminal-collapsed');
                icon.classList.add('rotate-180');
            } else {
                layout.classList.remove('terminal-collapsed');
                icon.classList.remove('rotate-180');
            }
            
            // Force chart resize
            setTimeout(() => {
                if(lwChart) {
                    const container = document.getElementById('tv_chart_container');
                    lwChart.applyOptions({ height: container.clientHeight, width: container.clientWidth });
                }
            }, 300); // match CSS transition duration
        }

        function switchMobileView(viewId, btnElement) {
            document.getElementById('view-market').classList.remove('view-active');
            document.getElementById('view-chart').classList.remove('view-active');
            document.getElementById('view-portfolio').classList.remove('view-active');
            
            document.getElementById(viewId).classList.add('view-active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-accent-blue');
                btn.classList.add('text-text-secondary');
                const icon = btn.querySelector('i');
                if(icon.className.includes('ph-fill')) icon.className = icon.className.replace('ph-fill', 'ph');
            });
            
            btnElement.classList.remove('text-text-secondary');
            btnElement.classList.add('text-accent-blue');
            const activeIcon = btnElement.querySelector('i');
            activeIcon.className = activeIcon.className.replace('ph ', 'ph-fill ');
            
            if(viewId === 'view-chart' && lwChart) {
                setTimeout(() => {
                    const container = document.getElementById('tv_chart_container');
                    lwChart.applyOptions({ height: container.clientHeight, width: container.clientWidth });
                }, 100);
            }
        }

        function setCategory(cat, btnElement) {
            state.ui.categoryFilter = cat;
            const buttons = document.getElementById('categoryFilters').children;
            for(let btn of buttons) btn.className = "px-3 py-1 rounded bg-panel-hover text-text-secondary hover:text-white transition-colors";
            btnElement.className = "px-3 py-1 rounded bg-accent-blue text-white";
            renderMarketWatch();
        }

        document.getElementById('marketSearch').addEventListener('input', (e) => {
            state.ui.searchQuery = e.target.value.toLowerCase();
            renderMarketWatch();
        });

        function selectSymbol(symbol, desc) {
            state.ui.activeSymbol = symbol;
            document.getElementById('chartTitle').innerText = symbol;
            document.getElementById('chartDesc').innerText = desc;
            
            renderMarketWatch(); 
            updateQuickTradeWidget();
            initTradingView(); 
            
            if(window.innerWidth <= 768) {
                const chartBtn = document.querySelectorAll('.nav-btn')[1];
                switchMobileView('view-chart', chartBtn);
            }
        }

        function renderMarketWatch() {
            const container = document.getElementById('marketList');
            container.innerHTML = '';
            
            const filteredAssets = state.assets.filter(a => {
                const matchesSearch = a.symbol.toLowerCase().includes(state.ui.searchQuery) || a.name.toLowerCase().includes(state.ui.searchQuery);
                const matchesCat = state.ui.categoryFilter === 'All' || a.type === state.ui.categoryFilter;
                return matchesSearch && matchesCat;
            });

            filteredAssets.forEach(asset => {
                const isActive = asset.symbol === state.ui.activeSymbol;
                const row = document.createElement('div');
                row.className = `grid grid-cols-4 px-3 py-3 border-b border-border-color cursor-pointer transition-all ${isActive ? 'bg-panel-hover border-l-2 border-l-accent-blue' : 'hover:bg-panel-hover border-l-2 border-l-transparent'}`;
                row.onclick = () => selectSymbol(asset.symbol, asset.name);
                
                const formatPrice = (p) => {
                    const s = p.toFixed(asset.digits);
                    return { main: s.slice(0,-1), last: s.slice(-1) };
                };
                const bid = formatPrice(asset.bid);
                const ask = formatPrice(asset.ask);

                row.innerHTML = `
                    <div class="col-span-2 flex flex-col justify-center overflow-hidden">
                        <span class="font-bold text-text-primary text-[13px] ${isActive ? 'text-accent-blue' : ''}">${asset.symbol}</span>
                        <span class="text-[9px] text-text-secondary truncate">${asset.name}</span>
                    </div>
                    <div class="text-right font-mono text-[13px] text-text-primary flex items-center justify-end" id="mw-bid-${asset.symbol}">
                        ${bid.main}<span class="text-[10px] text-text-secondary align-top">${bid.last}</span>
                    </div>
                    <div class="text-right font-mono text-[13px] text-text-primary flex items-center justify-end" id="mw-ask-${asset.symbol}">
                        ${ask.main}<span class="text-[10px] text-text-secondary align-top">${ask.last}</span>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // --- STREAMING_CHUNK: Order Management and Mechanics ---
        function toggleTradeWidget() {
            document.getElementById('quickTradeWidget').classList.toggle('hidden');
        }

        function adjustVolume(delta) {
            let v = parseFloat(document.getElementById('qt-volume').value) + delta;
            if(v < 0.01) v = 0.01;
            if(v > 100) v = 100;
            state.ui.volume = v;
            document.getElementById('qt-volume').value = v.toFixed(2);
        }

        function updateQuickTradeWidget() {
            const asset = state.assets.find(a => a.symbol === state.ui.activeSymbol);
            if (!asset) return;
            document.getElementById('qt-symbol').innerText = asset.symbol;
            document.getElementById('qt-sell-price').innerText = asset.bid.toFixed(asset.digits);
            document.getElementById('qt-buy-price').innerText = asset.ask.toFixed(asset.digits);
        }

        async function placeOrder(type) {
            await initAudio(); 
            
            const asset = state.assets.find(a => a.symbol === state.ui.activeSymbol);
            const price = type === 'BUY' ? asset.ask : asset.bid;
            const vol = state.ui.volume;
            
            const reqMargin = (vol * 100000) / state.account.leverage;
            if (reqMargin > (state.account.equity - state.account.margin)) {
                showToast('Execution Failed', 'Not enough free margin.');
                if(audioInit) synthLoss.triggerAttackRelease(["C3", "G2"], "8n");
                triggerVibration(200);
                return;
            }

            const btn = document.getElementById(type === 'BUY' ? 'btn-buy' : 'btn-sell');
            const overlay = document.getElementById(type === 'BUY' ? 'overlay-buy' : 'overlay-sell');
            btn.classList.add('pointer-events-none', 'scale-95'); 
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.remove('opacity-0'), 10);
            
            if(audioInit) synthUI.triggerAttackRelease("C5", "32n"); 

            // Simulate broker execution latency
            await new Promise(r => setTimeout(r, 300 + Math.random() * 400));

            overlay.classList.add('opacity-0');
            setTimeout(() => overlay.classList.add('hidden'), 200);
            btn.classList.remove('pointer-events-none', 'scale-95');

            const ticket = Math.floor(100000 + Math.random() * 900000); 
            
            const pos = { ticket, symbol: asset.symbol, type, volume: vol, digits: asset.digits, openPrice: price, time: Date.now() };
            state.positions.push(pos);
            
            // Draw on chart if applicable
            drawOrderLineOnChart(pos);

            if(state.ui.activeTab !== 'positions') setTerminalTab('positions');
            renderTerminal();
            showToast('Order Filled', `${type} ${vol.toFixed(2)} ${asset.symbol} @ ${price.toFixed(asset.digits)}`);
            
            const body = document.getElementById('app-body');
            body.classList.add('shake-screen');
            body.classList.add(type === 'BUY' ? 'flash-buy' : 'flash-sell');
            setTimeout(() => body.classList.remove('shake-screen', 'flash-buy', 'flash-sell'), 500);

            if(audioInit) synthSuccess.triggerAttackRelease(["C5", "E5", "G5"], "8n");
            triggerVibration([50, 50, 50]);
            document.getElementById('mobile-badge').classList.remove('hidden');
        }

        async function closePosition(ticket) {
            await initAudio();
            const idx = state.positions.findIndex(p => p.ticket === ticket);
            if (idx > -1) {
                const pos = state.positions[idx];
                const asset = state.assets.find(a => a.symbol === pos.symbol);
                const currentPrice = pos.type === 'BUY' ? asset.bid : asset.ask;
                
                const row = document.getElementById(`pos-row-${ticket}`);
                if(row) {
                    row.classList.add('opacity-50', 'pointer-events-none');
                    row.innerHTML = `<div class="col-span-10 text-center text-accent-blue flex justify-center items-center gap-2 py-2 text-xs font-sans"><i class="ph ph-spinner-gap animate-spin"></i> Routing #${ticket}...</div>`;
                }
                
                if(audioInit) synthUI.triggerAttackRelease("G4", "32n");
                await new Promise(r => setTimeout(r, 400 + Math.random() * 300));

                pos.profit = calculatePnL(pos);
                pos.closePrice = currentPrice;
                pos.closeTime = Date.now();
                
                state.account.balance += pos.profit;
                state.history.push(pos);
                
                // Remove price line from chart if exists
                if(pos.priceLineRef && candleSeries) {
                    candleSeries.removePriceLine(pos.priceLineRef);
                }

                state.positions.splice(idx, 1);
                renderTerminal();
                showToast('Position Closed', `Order #${ticket} closed. PnL: $${pos.profit.toFixed(2)}`);
                
                const body = document.getElementById('app-body');
                if (pos.profit >= 0) {
                    if(audioInit) synthSuccess.triggerAttackRelease(["E5", "G5", "C6"], "4n"); 
                    triggerVibration([100, 50, 100]);
                    body.classList.add('flash-buy');
                    setTimeout(() => body.classList.remove('flash-buy'), 500);
                } else {
                    if(audioInit) synthLoss.triggerAttackRelease(["E3", "C3"], "4n"); 
                    triggerVibration([200]);
                    body.classList.add('flash-sell');
                    setTimeout(() => body.classList.remove('flash-sell'), 500);
                }
                
                if(state.positions.length === 0) document.getElementById('mobile-badge').classList.add('hidden');
            }
        }

        function calculatePnL(pos) {
            const asset = state.assets.find(a => a.symbol === pos.symbol);
            if(!asset) return 0;
            const currentPrice = pos.type === 'BUY' ? asset.bid : asset.ask;
            const diff = pos.type === 'BUY' ? (currentPrice - pos.openPrice) : (pos.openPrice - currentPrice);
            const multiplier = asset.digits === 3 ? 100 : (asset.digits === 2 ? 1 : 10000);
            return diff * multiplier * pos.volume * 10; 
        }

        function setTerminalTab(tab) {
            state.ui.activeTab = tab;
            const tabPos = document.getElementById('tab-positions');
            const tabHis = document.getElementById('tab-history');
            
            if(tab === 'positions') {
                tabPos.className = "px-5 py-2 text-xs font-semibold text-accent-blue border-b-2 border-accent-blue transition-all";
                tabHis.className = "px-5 py-2 text-xs font-semibold text-text-secondary hover:text-text-primary border-b-2 border-transparent transition-all";
                document.getElementById('terminalHeader').innerHTML = `<div class="col-span-2">Symbol</div><div class="col-span-1">Ticket</div><div class="col-span-1">Type</div><div class="col-span-1">Vol</div><div class="col-span-1 text-right">Open</div><div class="col-span-1 text-right">Current</div><div class="col-span-2 text-right">Profit</div><div class="col-span-1 text-right"></div>`;
            } else {
                tabHis.className = "px-5 py-2 text-xs font-semibold text-accent-blue border-b-2 border-accent-blue transition-all";
                tabPos.className = "px-5 py-2 text-xs font-semibold text-text-secondary hover:text-text-primary border-b-2 border-transparent transition-all";
                document.getElementById('terminalHeader').innerHTML = `<div class="col-span-2">Symbol</div><div class="col-span-2">Ticket</div><div class="col-span-1">Type</div><div class="col-span-1">Vol</div><div class="col-span-2 text-right">Open / Close</div><div class="col-span-2 text-right">Profit</div>`;
            }
            renderTerminal();
        }

        function renderTerminal() {
            const container = document.getElementById('terminalList');
            container.innerHTML = '';
            
            let totalProfit = 0, usedMargin = 0;

            if (state.ui.activeTab === 'positions') {
                if (state.positions.length === 0) {
                    container.innerHTML = `<div class="p-4 text-center text-text-secondary text-xs">No open positions.</div>`;
                } else {
                    state.positions.forEach(pos => {
                        const asset = state.assets.find(a => a.symbol === pos.symbol);
                        const currentPrice = pos.type === 'BUY' ? asset.bid : asset.ask;
                        const profit = calculatePnL(pos);
                        totalProfit += profit;
                        usedMargin += (pos.volume * 100000) / state.account.leverage;

                        const typeColor = pos.type === 'BUY' ? 'text-accent-blue' : 'text-text-primary'; 
                        const pnlColor = profit >= 0 ? 'text-pnl-up' : 'text-pnl-down';
                        
                        const row = document.createElement('div');
                        row.id = `pos-row-${pos.ticket}`; 
                        row.className = `grid grid-cols-10 gap-2 px-4 py-2 text-[11px] font-mono border-b border-border-color hover:bg-panel-hover items-center transition-all duration-300`;
                        row.innerHTML = `
                            <div class="col-span-2 font-bold font-sans text-text-primary">${pos.symbol}</div>
                            <div class="col-span-1 text-text-secondary">#${pos.ticket}</div>
                            <div class="col-span-1 font-bold ${typeColor} font-sans">${pos.type}</div>
                            <div class="col-span-1 text-text-primary">${pos.volume.toFixed(2)}</div>
                            <div class="col-span-1 text-right text-text-secondary">${pos.openPrice.toFixed(pos.digits)}</div>
                            <div class="col-span-1 text-right text-text-primary">${currentPrice.toFixed(pos.digits)}</div>
                            <div class="col-span-2 text-right font-bold ${pnlColor}">${profit > 0 ? '+' : ''}${profit.toFixed(2)}</div>
                            <div class="col-span-1 flex justify-end">
                                <button class="w-6 h-6 rounded bg-border-color hover:bg-pnl-down flex items-center justify-center text-text-secondary hover:text-white transition-all" onclick="closePosition(${pos.ticket})">
                                    <i class="ph ph-x"></i>
                                </button>
                            </div>
                        `;
                        container.appendChild(row);
                    });
                }
            } else {
                if (state.history.length === 0) {
                    container.innerHTML = `<div class="p-4 text-center text-text-secondary text-xs">No trading history.</div>`;
                } else {
                    [...state.history].reverse().forEach(pos => {
                        const typeColor = pos.type === 'BUY' ? 'text-accent-blue' : 'text-text-primary'; 
                        const pnlColor = pos.profit >= 0 ? 'text-pnl-up' : 'text-pnl-down';
                        
                        const row = document.createElement('div');
                        row.className = `grid grid-cols-10 gap-2 px-4 py-2 text-[11px] font-mono border-b border-border-color hover:bg-panel-hover items-center`;
                        row.innerHTML = `
                            <div class="col-span-2 font-bold font-sans text-text-primary">${pos.symbol}</div>
                            <div class="col-span-2 text-text-secondary">#${pos.ticket}</div>
                            <div class="col-span-1 font-bold ${typeColor} font-sans">${pos.type}</div>
                            <div class="col-span-1 text-text-primary">${pos.volume.toFixed(2)}</div>
                            <div class="col-span-2 text-right text-text-secondary">${pos.openPrice.toFixed(pos.digits)} / ${pos.closePrice.toFixed(pos.digits)}</div>
                            <div class="col-span-2 text-right font-bold ${pnlColor}">${pos.profit > 0 ? '+' : ''}${pos.profit.toFixed(2)}</div>
                        `;
                        container.appendChild(row);
                    });
                }
            }

            state.account.margin = usedMargin;
            state.account.equity = state.account.balance + totalProfit;
            
            document.getElementById('headerBalance').innerText = formatMoney(state.account.balance);
            document.getElementById('ft-balance').innerText = state.account.balance.toFixed(2);
            document.getElementById('ft-equity').innerText = state.account.equity.toFixed(2);
            document.getElementById('ft-margin').innerText = state.account.margin.toFixed(2);
            document.getElementById('ft-free').innerText = (state.account.equity - state.account.margin).toFixed(2);
            
            const pnlEl = document.getElementById('ft-pnl');
            pnlEl.innerText = `${totalProfit >= 0 ? '+' : ''}${totalProfit.toFixed(2)}`;
            pnlEl.className = `font-bold text-sm ${totalProfit >= 0 ? 'text-pnl-up' : (totalProfit < 0 ? 'text-pnl-down' : 'text-text-primary')}`;
        }

        // --- STREAMING_CHUNK: Live Price & Chart Update Loop ---
        setInterval(() => {
            let activeAssetTick = null;
            
            state.assets.forEach(asset => {
                const volatility = asset.symbol === 'BTCUSD' ? 10 : (asset.digits <= 3 ? 0.05 : 0.00005);
                const change = (Math.random() - 0.5) * volatility;
                
                const oldBid = asset.bid;
                asset.bid += change;
                const pipValue = asset.digits === 3 ? 0.01 : (asset.digits === 2 ? 1 : 0.00001);
                asset.ask = asset.bid + (asset.spread * pipValue);
                
                // Visual Updates for Market Watch
                const bidEl = document.getElementById(`mw-bid-${asset.symbol}`);
                if (bidEl) {
                    const isUp = asset.bid > oldBid;
                    const formatPrice = (p) => { const s = p.toFixed(asset.digits); return { main: s.slice(0,-1), last: s.slice(-1) }; };
                    const bid = formatPrice(asset.bid);
                    const ask = formatPrice(asset.ask);
                    
                    bidEl.innerHTML = `${bid.main}<span class="text-[10px] text-text-secondary align-top">${bid.last}</span>`;
                    document.getElementById(`mw-ask-${asset.symbol}`).innerHTML = `${ask.main}<span class="text-[10px] text-text-secondary align-top">${ask.last}</span>`;
                    
                    bidEl.parentElement.classList.remove('tick-up', 'tick-down');
                    void bidEl.parentElement.offsetWidth; // Reflow
                    bidEl.parentElement.classList.add(isUp ? 'tick-up' : 'tick-down');
                }

                if (asset.symbol === state.ui.activeSymbol) {
                    activeAssetTick = asset;
                    updateQuickTradeWidget();
                }
            });
            
            // Update Lightweight Chart Tick
            if (activeAssetTick && candleSeries && chartDataBuffer[activeAssetTick.symbol]) {
                const data = chartDataBuffer[activeAssetTick.symbol];
                const last = data[data.length-1];
                
                const now = Math.floor(Date.now() / 1000);
                // Simple 15m candle update simulation
                if (now - last.time > 15 * 60) {
                    const newCandle = { time: now - (now % (15*60)), open: last.close, high: last.close, low: last.close, close: activeAssetTick.bid };
                    data.push(newCandle);
                    candleSeries.update(newCandle);
                } else {
                    last.close = activeAssetTick.bid;
                    if(activeAssetTick.bid > last.high) last.high = activeAssetTick.bid;
                    if(activeAssetTick.bid < last.low) last.low = activeAssetTick.bid;
                    candleSeries.update(last);
                }
            }
            
            if(state.positions.length > 0 && state.ui.activeTab === 'positions') renderTerminal();
        }, 1500);

        // Init
        window.onload = () => {
            setCategory('All', document.getElementById('categoryFilters').children[0]);
            setTerminalTab('positions');
            selectSymbol(state.ui.activeSymbol, "Euro / US Dollar");
            
            document.getElementById('qt-volume').addEventListener('change', (e) => {
                let v = parseFloat(e.target.value);
                if(isNaN(v) || v < 0.01) v = 0.01;
                state.ui.volume = v;
                e.target.value = v.toFixed(2);
            });
        };
    </script>
